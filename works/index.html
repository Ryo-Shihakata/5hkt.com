<!DOCTYPE html>
<html lang="ja" data-lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Works — 5HKT</title>
  <meta name="description" content="作成Webアプリの一覧 — 個人・チームで企画から実装まで担当した成果物">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="pf-root" id="pf-root">

  <!-- NAV -->
  <header class="pf-header">
    <div class="pf-header-inner">
      <a href="../" class="pf-logo">_PORTFOLIO</a>
      <nav class="pf-nav" id="pf-nav"></nav>
      <button class="pf-lang" id="pf-lang" type="button"></button>
    </div>
  </header>

  <main id="top">
    <section class="pf-section" id="works">
      <p class="pf-sec-kicker">// all works</p>
      <h2 class="pf-sec-title" id="pf-works-title"></h2>
      <p class="pf-sec-lead" id="pf-works-lead"></p>

      <div class="pf-filter" id="pf-works-filter"></div>
      <p class="pf-works-count" id="pf-works-count"></p>
      <div class="pf-works-grid" id="pf-works-body"></div>

      <div class="pf-toggle-wrap">
        <a class="pf-btn pf-btn-accent" href="../#webapps" id="pf-works-back"></a>
      </div>
    </section>
  </main>

  <footer class="pf-footer">
    <p id="pf-footer-text"></p>
    <p class="pf-footer-copy" id="pf-footer-copy"></p>
  </footer>

</div>

<script type="module" src="../js/works.js"></script>
</body>
</html>
